<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="">
    <meta name="author" content=""> 
    
    <title>control de arduino</title>

    <link rel="stylesheet" type="text/css" href="assets/vendor/bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" type="text/css" href="assets/fonts/font-awesome-4.7.0/css/font-awesome.min.css" />
    <link rel="stylesheet" type="text/css" href="assets/vendor/animate/animate.css" />
    <link rel="stylesheet" type="text/css" href="assets/vendor/css-hamburgers/hamburgers.min.css" />
    <link rel="stylesheet" type="text/css" href="assets/vendor/select2/select2.min.css" />
    <link rel="stylesheet" type="text/css" href="assets/css/util.css" />
    <link rel="stylesheet" type="text/css" href="assets/css/main.css" />
    <link rel="icon" type="image/png" href="assets/images/icons/favicon.ico" />
</head>

<body>
    <div class="limiter">
        <div class="container-login100">
            <div class="wrap-login100">
                <div class="logo js-tilt" data-tilt>
                    <img src="assets/images/630x420.png" alt="logo" style="max-width: 200px; height: auto;">
                </div>

                <div class="login-form">
                    <div class="login100-pic">
                        <img src="assets/images/login-animation.gif" alt="login-image" />
                    </div>	

                    <form class="login100-form" action="dashboard.html" method="GET">
                        <span class="login100-form-title"> Iniciar Sesion </span>

                        <div class="wrap-input100">
                            <input class="input100" type="text" name="username" placeholder="Usuario" required>
                            <span class="focus-input100"></span>
                            <span class="symbol-input100">
                                <i class="fa fa-envelope" aria-hidden="true"></i>
                            </span>
                        </div>

                        <div class="wrap-input100">
                            <input class="input100" type="password" name="password" placeholder="Contraseña" required>
                            <span class="focus-input100"></span>
                            <span class="symbol-input100">
                                <i class="fa fa-lock" aria-hidden="true"></i>
                            </span>
                        </div>

                        <div class="container-login100-form-btn">
                            <button type="submit" class="login100-form-btn">Ingresar</button>
                        </div>

                        <div class="text-center p-t-12">
                            <span class="txt1"> ¿Olvidaste </span>
                            <a class="txt2" href="#">Contraseña? </a>
                        </div>

                        <div class="text-center p-t-12">
                            <span class="txt1">¿No tienes cuenta? </span>
                            <a class="txt2" href="#"> Registrarse
                                <i class="fa fa-long-arrow-left m-l-5" aria-hidden="true"></i>
                            </a>
                        </div>

                        <!-- social media buttons -->
                        <div class="text-center p-t-100">
                            <p class="txt2">Iniciar sesion con </p> <br>
                            <a href="#">
                                <i class="fa fa-google fa-2x icon-social" aria-hidden="true"></i>
                            </a>
                            <a href="#">
                                <i class="fa fa-twitter fa-2x icon-social" aria-hidden="true"></i>
                            </a>
                            <a href="#">
                                <i class="fa fa-facebook fa-2x icon-social" aria-hidden="true"></i>
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <script src="assets/vendor/jquery/jquery-3.2.1.min.js"></script>
    <script src="assets/vendor/bootstrap/js/bootstrap.min.js"></script>
    <script src="assets/vendor/select2/select2.min.js"></script>
    <script src="assets/vendor/tilt/tilt.jquery.min.js"></script>
    <script>
        $(".js-tilt").tilt({
            scale: 1.1,
        });
    </script>
    <script src="assets/js/main.js"></script>
</body>
</html>
